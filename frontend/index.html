<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="9" fill="#6366f1"/>
        <path d="M10 18h16M18 10v16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="4.5" fill="white" fill-opacity="0.25"/>
      </svg>
      <span>TaskFlow Pro</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Accedi</button>
      <button class="auth-tab" data-tab="register">Registrati</button>
    </div>
    <form id="login-form" class="auth-form">
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com" required/>
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-primary full-width">Accedi</button>
      <p class="auth-hint">Registrati con qualsiasi email e password per iniziare</p>
    </form>
    <form id="register-form" class="auth-form hidden">
      <div class="field-group">
        <label>Nome completo</label>
        <input type="text" id="reg-name" placeholder="Mario Rossi" required/>
      </div>
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="tu@email.com" required/>
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Minimo 6 caratteri" required/>
      </div>
      <button type="submit" class="btn-primary full-width">Crea account</button>
    </form>
    <div id="auth-error" class="auth-error hidden"></div>
  </div>
</div>

<div id="app" class="app hidden">
  <nav class="navbar">
    <div class="nav-left">
      <button class="hamburger" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-logo">
        <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="9" fill="#6366f1"/>
          <path d="M10 18h16M18 10v16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="4.5" fill="white" fill-opacity="0.25"/>
        </svg>
        <span>TaskFlow Pro</span>
      </div>
    </div>
    <div class="nav-links" id="nav-links">
      <a href="#" class="nav-link active" data-page="dashboard">Dashboard</a>
      <a href="#" class="nav-link" data-page="projects">Progetti</a>
      <a href="#" class="nav-link" data-page="tasks">Task</a>
      <a href="#" class="nav-link" data-page="kanban">Kanban</a>
    </div>
    <div class="nav-right">
      <div class="nav-avatar" id="nav-avatar"></div>
      <button class="btn-ghost" id="logout-btn">Esci</button>
    </div>
  </nav>

  <main class="main-content">
    <div id="page-dashboard" class="page active">
      <div class="page-header">
        <div>
          <h1 id="dashboard-greeting">Buongiorno 👋</h1>
          <p class="page-subtitle">Ecco il riepilogo di oggi</p>
        </div>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="charts-grid">
        <div class="chart-card">
          <h3>Ore lavorate — ultimi 7 giorni</h3>
          <canvas id="chart-hours" height="160"></canvas>
        </div>
        <div class="chart-card">
          <h3>Task per progetto</h3>
          <canvas id="chart-projects" height="160"></canvas>
        </div>
      </div>
      <div class="recent-section">
        <h3>Task recenti</h3>
        <div id="recent-tasks"></div>
      </div>
    </div>

    <div id="page-projects" class="page hidden">
      <div class="page-header">
        <h1>Progetti</h1>
        <button class="btn-primary" id="new-project-btn">+ Nuovo progetto</button>
      </div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>

    <div id="page-tasks" class="page hidden">
      <div class="page-header">
        <h1>Task</h1>
        <div class="page-actions">
          <select id="filter-project" class="select-filter">
            <option value="">Tutti i progetti</option>
          </select>
          <select id="filter-status" class="select-filter">
            <option value="">Tutti gli stati</option>
            <option value="todo">Da fare</option>
            <option value="in_progress">In corso</option>
            <option value="done">Completati</option>
          </select>
          <button class="btn-primary" id="new-task-btn">+ Nuovo task</button>
        </div>
      </div>
      <div class="tasks-list" id="tasks-list"></div>
    </div>

    <div id="page-kanban" class="page hidden">
      <div class="page-header">
        <h1>Kanban</h1>
        <select id="kanban-project-filter" class="select-filter">
          <option value="">Tutti i progetti</option>
        </select>
      </div>
      <div class="kanban-board" id="kanban-board">
        <div class="kanban-col" data-status="todo">
          <div class="kanban-col-header">
            <span class="col-dot todo"></span>Da fare
            <span class="col-count" id="count-todo">0</span>
          </div>
          <div class="kanban-cards" id="kanban-todo"></div>
        </div>
        <div class="kanban-col" data-status="in_progress">
          <div class="kanban-col-header">
            <span class="col-dot inprogress"></span>In corso
            <span class="col-count" id="count-in_progress">0</span>
          </div>
          <div class="kanban-cards" id="kanban-in_progress"></div>
        </div>
        <div class="kanban-col" data-status="review">
          <div class="kanban-col-header">
            <span class="col-dot review"></span>In revisione
            <span class="col-count" id="count-review">0</span>
          </div>
          <div class="kanban-cards" id="kanban-review"></div>
        </div>
        <div class="kanban-col" data-status="done">
          <div class="kanban-col-header">
            <span class="col-dot done"></span>Completati
            <span class="col-count" id="count-done">0</span>
          </div>
          <div class="kanban-cards" id="kanban-done"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
